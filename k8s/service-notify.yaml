apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-notify
spec:
  replicas: 1
  selector:
    matchLabels:
      app: service-notify
  template:
    metadata:
      labels:
        app: service-notify
    spec:
      containers:
        - name: service-notify
          image: europe-west1-docker.pkg.dev/mern-grid-cluster/mern-repo/service-notify:latest
          ports:
            - containerPort: 5003
          env:
            - name: PORT
              value: "5003"
            - name: MONGO_URI
              value: "mongodb://mongo:27017/notifydb"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: service-notify
spec:
  selector:
    app: service-notify
  ports:
    - port: 5003
      targetPort: 5003
